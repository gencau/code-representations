hydra:
  job:
    name: ${backbone.name}_${backbone.model_name}_${backbone.type}
  run:
    dir: /Users/gen/workspace/filesummaries/long-context-experiments/bug_localization/output/rq3/swe/filepaths/${hydra:job.name}${run_suffix}
  job_logging:
    root:
      handlers: [console, file]
backbone:
  _target_: src.baselines.backbones.agent.ollama_rank_backbone.OllamaRankBackbone
  name: lca-ranker
  # This is the model identifier as recognized by Ollama.
  model_name: qwen2.5-coder-32b-16k
  # Change this based on the experiment type
  type: rank-w-filenames
  retriever: 
    _target_: src.baselines.backbones.agent.context.summary_retriever.SummaryRetriever
    database_location: "/Volumes/T9/rq1/summaries/swe/queries/prompt3-codexembed/"
    #database_location: "/Volumes/T9/rq1/summaries/swe/prompt-variations/prompt2-codexembed"

# Change this: must fit with the backbone type
  prompt:
  # Change this based on the experiment type
    _target_: src.baselines.backbones.agent.prompts.agent_context_prompt.AgentContextPrompt
  
  experiment: rank-from-results

data_source:
